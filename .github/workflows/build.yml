name: Mudabbir Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Create Android project
        run: |
          flutter create --platforms=android .
          sed -i 's/android:name=".MainActivity"/android:name="io.flutter.embedding.android.FlutterActivity"/' android/app/src/main/AndroidManifest.xml
          echo 'flutterEmbedding=2' >> android/gradle.properties
          sed -i 's/compileSdk = .*/compileSdk = 35/' android/app/build.gradle.kts
          sed -i '/compileSdk/a\    ndkVersion = "27.0.12077973"' android/app/build.gradle.kts

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: |
          dart pub global activate flutter_launcher_icons
          dart pub global run flutter_launcher_icons:main

      - name: Copy icon to mipmap
        run: |
          mkdir -p android/app/src/main/res/mipmap-{hdpi,mdpi,xhdpi,xxhdpi,xxxhdpi}
          for d in hdpi mdpi xhdpi xxhdpi xxxhdpi; do cp assets/icon.png android/app/src/main/res/mipmap-$d/ic_launcher.png; done

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: mudabbir-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: mudabbir-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Upload x86_64
        uses: actions/upload-artifact@v4
        with:
          name: mudabbir-x86_64
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
